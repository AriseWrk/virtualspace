{% extends "base.html" %}
{% block title %}Смена пароля — АБ Радонеж{% endblock %}

{% block content %}
<div class="page-wrapper page-wrapper--narrow">
    <div class="page-header">
        <div>
            <div class="page-tag">Профиль</div>
            <h1 class="page-title">Смена пароля</h1>
        </div>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn--ghost">← Дашборд</a>
    </div>

    <form method="POST" class="form-card">
        <div class="form-group" style="margin-bottom:16px">
            <label class="form-label">Текущий пароль *</label>
            <input type="password" name="old_password" class="form-input" required placeholder="Введите текущий пароль">
        </div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Новый пароль *</label>
                <input type="password" name="new_password" class="form-input" required placeholder="Минимум 6 символов">
            </div>
            <div class="form-group">
                <label class="form-label">Подтверждение *</label>
                <input type="password" name="confirm_password" class="form-input" required placeholder="Повторите новый пароль">
            </div>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('dashboard.index') }}" class="btn btn--ghost">Отмена</a>
            <button type="submit" class="btn btn--primary">Сменить пароль</button>
        </div>
    </form>
</div>
{% endblock %}
