{% extends "base.html" %}
{% block title %}{% if project %}Редактировать{% else %}Новый проект{% endif %} — Проекты{% endblock %}

{% block content %}
<div class="page-wrapper page-wrapper--narrow">
    <div class="page-header">
        <div>
            <div class="page-tag">Проекты</div>
            <h1 class="page-title">
                {% if project %}Редактировать проект{% else %}Новый проект{% endif %}
            </h1>
        </div>
        <a href="{{ url_for('engineer.projects') }}" class="btn btn--ghost">← Назад</a>
    </div>

    <form method="POST" class="form-card">

        <div class="form-section-title">Основная информация</div>
        <div class="form-row">
            <div class="form-group form-group--wide">
                <label class="form-label">Название объекта *</label>
                <input type="text" name="name" class="form-input" required
                       value="{{ project.name if project else '' }}"
                       placeholder="ТРЦ Москва — СКС и видеонаблюдение">
            </div>
            <div class="form-group">
                <label class="form-label">Статус</label>
                <select name="status" class="form-select">
                    {% for val, label in {
                        'new':         'Новый',
                        'design':      'Проектирование',
                        'planning':    'Планирование',
                        'in_progress': 'Монтаж',
                        'pnr':         'ПНР',
                        'completed':   'Сдан',
                        'on_hold':     'Приостановлен'
                    }.items() %}
                    <option value="{{ val }}"
                            {% if project and project.status == val %}selected
                            {% elif not project and val == 'new' %}selected{% endif %}>
                        {{ label }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group form-group--wide">
                <label class="form-label">Адрес объекта</label>
                <input type="text" name="address" class="form-input"
                       value="{{ project.address if project else '' }}"
                       placeholder="г. Москва, ул. Ленина, 1">
            </div>
            <div class="form-group">
                <label class="form-label">Заказчик / клиент</label>
                <input type="text" name="client" class="form-input"
                       value="{{ project.client if project else '' }}"
                       placeholder="ООО Ромашка">
            </div>
        </div>

        <div class="form-section-title">Команда</div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Инженер-монтажник</label>
                <select name="engineer_id" class="form-select">
                    <option value="">— Не назначен —</option>
                    {% for eng in engineers %}
                    <option value="{{ eng.id }}"
                            {% if project and project.engineer_id == eng.id %}selected{% endif %}>
                        {{ eng.full_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Проектировщик</label>
                <select name="designer_id" class="form-select">
                    <option value="">— Не назначен —</option>
                    {% for des in designers %}
                    <option value="{{ des.id }}"
                            {% if project and project.designer_id == des.id %}selected{% endif %}>
                        {{ des.full_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Описание / примечание</label>
            <textarea name="description" class="form-textarea" rows="3"
                      placeholder="Краткое описание объекта, особенности…">{{ project.description if project else '' }}</textarea>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('engineer.projects') }}" class="btn btn--ghost">Отмена</a>
            <button type="submit" class="btn btn--primary">
                {% if project %}Сохранить изменения{% else %}Создать проект{% endif %}
            </button>
        </div>
    </form>
</div>
{% endblock %}
