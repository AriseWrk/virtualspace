{% extends "base.html" %}
{% block title %}Заявка на транспорт — Гараж{% endblock %}

{% block content %}
<div class="page-wrapper page-wrapper--narrow">
    <div class="page-header">
        <div>
            <div class="page-tag" style="color:#c8643c">Гараж</div>
            <h1 class="page-title">Заявка на транспорт</h1>
        </div>
        <a href="{{ url_for('garage.requests_list') }}" class="btn btn--ghost">← Назад</a>
    </div>

    <form method="POST" class="form-card">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Дата поездки *</label>
                <input type="date" name="planned_date" class="form-input"
                       value="{{ today }}" required>
            </div>
            <div class="form-group">
                <label class="form-label">Количество пассажиров</label>
                <input type="number" name="passengers" class="form-input"
                       min="1" max="20" value="1">
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Куда *</label>
            <input type="text" name="destination" class="form-input" required
                   placeholder="г. Москва, ул. Примерная, 1 — Объект ТЦ Радуга">
        </div>
        <div class="form-group">
            <label class="form-label">Цель поездки</label>
            <input type="text" name="purpose" class="form-input"
                   placeholder="Монтаж, выезд на объект, встреча…">
        </div>
        {% if vehicles %}
        <div class="form-group">
            <label class="form-label">Предпочтительный автомобиль</label>
            <select name="vehicle_id" class="form-select">
                <option value="">— Любой свободный —</option>
                {% for v in vehicles %}
                <option value="{{ v.id }}">{{ v.name }} · {{ v.plate }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
        <div class="form-group">
            <label class="form-label">Примечание</label>
            <textarea name="notes" class="form-textarea" rows="2"
                      placeholder="Дополнительные пожелания…"></textarea>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('garage.requests_list') }}" class="btn btn--ghost">Отмена</a>
            <button type="submit" class="btn btn--primary">Подать заявку</button>
        </div>
    </form>
</div>
{% endblock %}
