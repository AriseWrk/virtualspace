{% extends "base.html" %}
{% block title %}Новое списание — Склад{% endblock %}

{% block content %}
<div class="page-wrapper page-wrapper--narrow">
    <div class="page-header">
        <div>
            <div class="page-tag">Склад / Списания</div>
            <h1 class="page-title">Новое списание</h1>
        </div>
        <a href="{{ url_for('warehouse.write_offs') }}" class="btn btn--ghost">← Назад</a>
    </div>

    <form method="POST" class="form-card">
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">Причина списания *</label>
                <select name="reason" class="form-select" required>
                    <option value="damage">Порча</option>
                    <option value="loss">Недостача</option>
                    <option value="expired">Истёк срок</option>
                    <option value="used">Использовано</option>
                    <option value="other" selected>Прочее</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">Примечание</label>
            <textarea name="notes" class="form-textarea" rows="2"
                      placeholder="Дополнительные сведения…"></textarea>
        </div>

        <div class="form-section-title">Позиции списания</div>
        <div id="wo-items">
            <div class="order-item-row wo-row">
                <select name="item_id[]" class="form-select order-item-select" required>
                    <option value="">— Выберите позицию —</option>
                    {% for item in items %}
                    <option value="{{ item.id }}" data-unit="{{ item.unit }}"
                            data-qty="{{ item.quantity }}">
                        {{ item.name }} — {{ item.quantity }} {{ item.unit }}
                    </option>
                    {% endfor %}
                </select>
                <input type="number" name="quantity[]" class="form-input order-qty-input"
                       placeholder="Кол-во" step="0.001" min="0.001" required>
                <span class="order-unit">шт</span>
                <button type="button" class="btn-remove-row" onclick="removeRow(this)">✕</button>
            </div>
        </div>
        <button type="button" class="btn btn--ghost btn--sm" style="margin-top:10px"
                onclick="addRow()">+ Добавить позицию</button>

        <div class="form-actions">
            <a href="{{ url_for('warehouse.write_offs') }}" class="btn btn--ghost">Отмена</a>
            <button type="submit" class="btn btn--primary">Создать черновик</button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<script>
const rowTpl = document.querySelector('.wo-row').cloneNode(true);
function addRow() {
    const r = rowTpl.cloneNode(true);
    r.querySelectorAll('select,input').forEach(el => el.value = '');
    r.querySelector('.order-unit').textContent = 'шт';
    document.getElementById('wo-items').appendChild(r);
    bindUnit(r);
}
function removeRow(btn) {
    if (document.querySelectorAll('.wo-row').length > 1)
        btn.closest('.wo-row').remove();
}
function bindUnit(row) {
    row.querySelector('select').addEventListener('change', function() {
        row.querySelector('.order-unit').textContent =
            this.options[this.selectedIndex].dataset.unit || 'шт';
    });
}
document.querySelectorAll('.wo-row').forEach(bindUnit);
</script>
{% endblock %}
